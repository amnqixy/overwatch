<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>솔저: 76 에임 트레이너</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Arial', sans-serif; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
        }
        
        /* 시작 화면 */
        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        #start-btn { 
            padding: 20px 40px; font-size: 24px; font-weight: bold; color: white; background: #ff9900; 
            border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
        }
        #start-btn:active { transform: scale(0.95); }
        #version { position: absolute; bottom: 20px; color: #888; font-size: 14px; font-weight: bold; }

        /* 크로스헤어 */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        .ch-line { position: absolute; background-color: #00ff00; }
        .ch-top { top: 0; left: 9px; width: 2px; height: 6px; }
        .ch-bottom { bottom: 0; left: 9px; width: 2px; height: 6px; }
        .ch-left { top: 9px; left: 0; width: 6px; height: 2px; }
        .ch-right { top: 9px; right: 0; width: 6px; height: 2px; }
        .ch-dot { top: 9px; left: 9px; width: 2px; height: 2px; border-radius: 50%; }

        /* HUD UI */
        #top-ui { position: absolute; top: 10px; left: 0; width: 100%; text-align: center; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 5; pointer-events: none;}
        
        #health-ui { position: absolute; top: 10px; left: 20px; z-index: 5; pointer-events: none; }
        #health-bar-bg { width: 150px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; transform: skewX(-15deg); }
        #health-bar { width: 100%; height: 100%; background: #ffffff; transition: width 0.2s, background 0.2s; }
        #health-text { color: white; font-size: 16px; font-weight: bold; font-style: italic; margin-bottom: 5px; text-shadow: 1px 1px 0 #000; }

        #ult-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 15; }
        #ult-btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); color: white; font-size: 18px; font-weight: bold; position: relative; overflow: hidden; pointer-events: auto; touch-action: none;}
        #ult-btn:active { transform: scale(0.9); }
        #ult-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(0, 150, 255, 0.6); transition: height 0.3s; pointer-events: none; }
        #ult-text { position: relative; z-index: 1; pointer-events: none; }

        #ult-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,100,255,0.1) 0%, rgba(0,50,255,0.4) 100%); border: 5px solid rgba(0, 150, 255, 0.8); box-sizing: border-box; display: none; z-index: 2; pointer-events: none; }
        
        #enemy-huds { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }
        .enemy-hp { position: absolute; width: 40px; height: 5px; background: red; border: 1px solid black; transform: translate(-50%, -50%); display: none; }

        /* 터치 컨트롤 영역 */
        #left-zone { position: absolute; left: 0; top: 0; width: 50%; height: 100%; z-index: 10; }
        #right-zone { position: absolute; right: 0; top: 0; width: 50%; height: 100%; z-index: 10; }
        
        /* 조이스틱 UI */
        #joystick-base { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; pointer-events: none; z-index: 11; }
        #joystick-knob { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; top: 35px; left: 35px; pointer-events: none; }

        /* 우측 액션 버튼들 */
        #action-buttons { position: absolute; bottom: 20px; right: 20px; z-index: 15; display: flex; flex-direction: column; gap: 15px; align-items: flex-end; }
        .btn-row { display: flex; gap: 15px; }
        .action-btn { 
            width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 14px; 
            text-shadow: 1px 1px 0 #000; touch-action: none; position: relative; overflow: hidden;
        }
        .action-btn:active, .action-btn.active-toggle { background: rgba(255, 153, 0, 0.6); transform: scale(0.9); }
        .action-btn.fire { width: 80px; height: 80px; font-size: 18px; background: rgba(255, 50, 50, 0.4); border-color: #ff3333; }
        .action-btn.fire:active { background: rgba(255, 50, 50, 0.8); }
        
        .cooldown { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; font-size: 20px; color: #ff3333; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r140/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <h1 style="color:#ff9900; margin-bottom: 10px; font-size: 32px;">SOLDIER: 76</h1>
        <p style="margin-bottom: 30px;">모바일 터치스크린 에디션</p>
        <button id="start-btn">게임 시작 (터치)</button>
        <div id="version">v2.0 (Mobile Touch Complete)</div>
    </div>

    <div id="crosshair">
        <div class="ch-line ch-top"></div>
        <div class="ch-line ch-bottom"></div>
        <div class="ch-line ch-left"></div>
        <div class="ch-line ch-right"></div>
        <div class="ch-line ch-dot"></div>
    </div>

    <div id="top-ui">처치: <span id="score">0</span> | 시간: <span id="timer">00:00</span></div>
    
    <div id="health-ui">
        <div id="health-text">200 / 200</div>
        <div id="health-bar-bg"><div id="health-bar"></div></div>
    </div>

    <div id="ult-ui">
        <div id="ult-btn">
            <div id="ult-fill"></div>
            <div id="ult-text">0%</div>
        </div>
        <div style="color:white; font-size:12px; font-weight:bold; margin-top:5px; text-shadow:1px 1px 0 #000;">궁극기</div>
    </div>

    <div id="left-zone"></div>
    <div id="right-zone"></div>

    <div id="joystick-base"><div id="joystick-knob"></div></div>

    <div id="action-buttons">
        <div class="btn-row">
            <div class="action-btn" id="btn-shift">질주</div>
            <div class="action-btn" id="btn-e">생체<div class="cooldown" id="cd-e"></div></div>
            <div class="action-btn" id="btn-r">로켓<div class="cooldown" id="cd-r"></div></div>
        </div>
        <div class="btn-row" style="align-items: flex-end;">
            <div class="action-btn" id="btn-jump" style="margin-right: 20px;">점프</div>
            <div class="action-btn fire" id="btn-fire">사격</div>
        </div>
    </div>

    <div id="ult-overlay"></div>
    <div id="enemy-huds"></div>

<script>
    let camera, scene, renderer;
    let clock = new THREE.Clock();
    let isGameRunning = false; 

    let player = {
        height: 1.6, speed: 8, sprintMultiplier: 1.8,
        velocity: new THREE.Vector3(), direction: new THREE.Vector3(),
        canJump: false, hp: 200, maxHp: 200, ultGauge: 0,
        isSprinting: false, isShooting: false,
        lastFireTime: 0, fireRate: 0.1, ultActive: false, ultTimer: 0
    };

    let cooldowns = { E: { current: 0, max: 15 }, R: { current: 0, max: 6 } };
    const colliders = [];
    const gravity = -30;
    
    let enemies = [];
    let projectiles = [];
    let bioticFields = [];
    let particles = [];
    
    let score = 0;
    let gameTime = 0;

    let euler = new THREE.Euler(0, 0, 0, 'YXZ');
    const PI_2 = Math.PI / 2;

    const chElements = document.querySelectorAll('.ch-line');

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 0, 150);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = player.height;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.domElement.style.touchAction = 'none';
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        hemiLight.position.set(0, 200, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(-50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        buildMap();
        window.addEventListener('resize', onWindowResize);

        // --- 모바일 전용 이벤트 바인딩 ---
        document.getElementById('start-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            document.getElementById('blocker').style.display = 'none';
            isGameRunning = true;
        });

        setupTouchControls();

        for(let i=0; i<7; i++) spawnEnemy();
    }

    function buildMap() {
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        const grid = new THREE.GridHelper(200, 100, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x88aa88 });

        for (let i = 0; i < 40; i++) {
            const mesh = new THREE.Mesh(boxGeo, boxMat);
            mesh.scale.set(Math.random() * 5 + 2, Math.random() * 5 + 2, Math.random() * 5 + 2);
            mesh.position.set((Math.random() - 0.5) * 150, mesh.scale.y / 2, (Math.random() - 0.5) * 150);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            mesh.geometry.computeBoundingBox();
            colliders.push(mesh);
        }
    }

    // --- 핵심: 터치 컨트롤 로직 ---
    function setupTouchControls() {
        const leftZone = document.getElementById('left-zone');
        const rightZone = document.getElementById('right-zone');
        const joystickBase = document.getElementById('joystick-base');
        const joystickKnob = document.getElementById('joystick-knob');
        
        let moveTouchId = null;
        let joyOrigin = { x: 0, y: 0 };

        // 조이스틱 (이동)
        leftZone.addEventListener('touchstart', e => {
            e.preventDefault();
            if(!isGameRunning) return;
            const touch = e.changedTouches[0];
            moveTouchId = touch.identifier;
            joyOrigin.x = touch.clientX;
            joyOrigin.y = touch.clientY;
            
            joystickBase.style.display = 'block';
            joystickBase.style.left = (joyOrigin.x - 60) + 'px';
            joystickBase.style.top = (joyOrigin.y - 60) + 'px';
            joystickKnob.style.transform = `translate(0px, 0px)`;
        });

        leftZone.addEventListener('touchmove', e => {
            e.preventDefault();
            if(!isGameRunning) return;
            for(let touch of e.changedTouches) {
                if(touch.identifier === moveTouchId) {
                    let dx = touch.clientX - joyOrigin.x;
                    let dy = touch.clientY - joyOrigin.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    let maxDist = 40; // 조이스틱 가동 범위
                    
                    if(distance > maxDist) {
                        dx = (dx / distance) * maxDist;
                        dy = (dy / distance) * maxDist;
                    }
                    
                    joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
                    
                    // 방향키 벡터로 변환 (상하 반전, 좌우)
                    player.direction.x = dx / maxDist;
                    player.direction.z = dy / maxDist;
                }
            }
        });

        const resetJoystick = (e) => {
            for(let touch of e.changedTouches) {
                if(touch.identifier === moveTouchId) {
                    moveTouchId = null;
                    joystickBase.style.display = 'none';
                    player.direction.set(0, 0, 0);
                }
            }
        };
        leftZone.addEventListener('touchend', resetJoystick);
        leftZone.addEventListener('touchcancel', resetJoystick);

        // 시점 이동 (에임)
        let aimTouchId = null;
        let lastAimX = 0, lastAimY = 0;

        rightZone.addEventListener('touchstart', e => {
            e.preventDefault();
            if(!isGameRunning) return;
            const touch = e.changedTouches[0];
            aimTouchId = touch.identifier;
            lastAimX = touch.clientX;
            lastAimY = touch.clientY;
        });

        rightZone.addEventListener('touchmove', e => {
            e.preventDefault();
            if(!isGameRunning) return;
            for(let touch of e.changedTouches) {
                if(touch.identifier === aimTouchId) {
                    let dx = touch.clientX - lastAimX;
                    let dy = touch.clientY - lastAimY;
                    lastAimX = touch.clientX;
                    lastAimY = touch.clientY;

                    euler.setFromQuaternion(camera.quaternion);
                    euler.y -= dx * 0.004; // 에임 감도
                    euler.x -= dy * 0.004;
                    euler.x = Math.max(-PI_2, Math.min(PI_2, euler.x));
                    camera.quaternion.setFromEuler(euler);
                }
            }
        });

        const resetAim = (e) => {
            for(let touch of e.changedTouches) {
                if(touch.identifier === aimTouchId) aimTouchId = null;
            }
        };
        rightZone.addEventListener('touchend', resetAim);
        rightZone.addEventListener('touchcancel', resetAim);

        // 액션 버튼 로직
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); player.isShooting = true; });
        document.getElementById('btn-fire').addEventListener('touchend', (e) => { e.preventDefault(); player.isShooting = false; chElements.forEach(el => el.style.backgroundColor = '#00ff00'); });
        
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if(player.canJump) { player.velocity.y += 12; player.canJump = false; }
        });

        const shiftBtn = document.getElementById('btn-shift');
        shiftBtn.addEventListener('touchstart', (e) => { 
            e.preventDefault();
            player.isSprinting = !player.isSprinting; // 모바일은 토글형식으로 변경
            if(player.isSprinting) shiftBtn.classList.add('active-toggle');
            else shiftBtn.classList.remove('active-toggle');
        });

        document.getElementById('btn-e').addEventListener('touchstart', (e) => { e.preventDefault(); useBioticField(); });
        document.getElementById('btn-r').addEventListener('touchstart', (e) => { e.preventDefault(); useHelixRocket(); });
        document.getElementById('ult-btn').addEventListener('touchstart', (e) => { e.preventDefault(); useTacticalVisor(); });
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function fireRifle() {
        if (!player.isShooting) return;
        
        // 사격시 질주 자동 해제
        if(player.isSprinting) {
            player.isSprinting = false;
            document.getElementById('btn-shift').classList.remove('active-toggle');
        }

        chElements.forEach(el => el.style.backgroundColor = '#ffffff');
        setTimeout(() => { if(player.isShooting) chElements.forEach(el => el.style.backgroundColor = '#00ff00'); }, 50);

        const raycaster = new THREE.Raycaster();
        let shootDirection = new THREE.Vector3();
        
        if (player.ultActive) {
            let target = getNearestEnemyInSight();
            if (target) {
                shootDirection.subVectors(target.mesh.position, camera.position).normalize();
                drawTracer(camera.position, target.mesh.position, 0x00aaff);
                damageEnemy(target, 10);
                return; 
            }
        }
        
        camera.getWorldDirection(shootDirection);
        raycaster.set(camera.position, shootDirection);
        
        let checkObjects = [...colliders, ...enemies.map(e => e.mesh)];
        const intersects = raycaster.intersectObjects(checkObjects);

        if (intersects.length > 0) {
            const hit = intersects[0];
            drawTracer(camera.position, hit.point, 0xffaa00);
            
            let hitEnemy = enemies.find(e => e.mesh === hit.object);
            if (hitEnemy) damageEnemy(hitEnemy, 10);
            else createExplosion(hit.point, 0.5, 0xcccccc);
        } else {
            let endPoint = camera.position.clone().add(shootDirection.multiplyScalar(100));
            drawTracer(camera.position, endPoint, 0xffaa00);
        }
    }

    function useBioticField() {
        if (cooldowns.E.current > 0) return;
        const geo = new THREE.CylinderGeometry(4, 4, 0.2, 32);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5 });
        const field = new THREE.Mesh(geo, mat);
        field.position.copy(camera.position);
        field.position.y = 0.1;
        scene.add(field);
        bioticFields.push({ mesh: field, timer: 5 });
        cooldowns.E.current = cooldowns.E.max;
        updateCooldownUI();
    }

    function useHelixRocket() {
        if (cooldowns.R.current > 0) return;
        const geo = new THREE.SphereGeometry(0.3, 8, 8);
        const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const rocket = new THREE.Mesh(geo, mat);
        rocket.position.copy(camera.position);
        
        let dir = new THREE.Vector3();
        if (player.ultActive) {
             let target = getNearestEnemyInSight();
             if(target) dir.subVectors(target.mesh.position, camera.position).normalize();
             else camera.getWorldDirection(dir);
        } else {
            camera.getWorldDirection(dir);
        }
        scene.add(rocket);
        projectiles.push({ mesh: rocket, velocity: dir.multiplyScalar(40), active: true });
        cooldowns.R.current = cooldowns.R.max;
        updateCooldownUI();
    }

    function useTacticalVisor() {
        if (player.ultGauge < 100 || player.ultActive) return;
        player.ultActive = true;
        player.ultGauge = 0;
        player.ultTimer = 10;
        document.getElementById('ult-overlay').style.display = 'block';
        updateUltUI();
    }

    function getNearestEnemyInSight() {
        let bestTarget = null;
        let maxDot = 0.85; 
        let camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);

        enemies.forEach(enemy => {
            let dirToEnemy = enemy.mesh.position.clone().sub(camera.position).normalize();
            let dot = camDir.dot(dirToEnemy);
            if (dot > maxDot) {
                maxDot = dot;
                bestTarget = enemy;
            }
        });
        return bestTarget;
    }

    function drawTracer(start, end, colorHex) {
        const material = new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.7 });
        const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
        const line = new THREE.Line(geometry, material);
        scene.add(line);
        setTimeout(() => { scene.remove(line); geometry.dispose(); material.dispose(); }, 50);
    }

    function createExplosion(position, radius, colorHex, damage = 0) {
        const geo = new THREE.SphereGeometry(radius, 16, 16);
        const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.8 });
        const sphere = new THREE.Mesh(geo, mat);
        sphere.position.copy(position);
        scene.add(sphere);
        particles.push({ mesh: sphere, life: 1.0, maxLife: 1.0, scaleRate: 5 });

        if (damage > 0) {
            enemies.forEach(enemy => {
                let dist = enemy.mesh.position.distanceTo(position);
                if (dist <= 6) damageEnemy(enemy, damage * (1 - dist/6)); 
            });
        }
    }

    function spawnEnemy() {
        const geo = new THREE.CapsuleGeometry(0.8, 1.5, 4, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.4 });
        const mesh = new THREE.Mesh(geo, mat);
        
        let x, z;
        do {
            x = (Math.random() - 0.5) * 100;
            z = (Math.random() - 0.5) * 100;
        } while(Math.abs(x - camera.position.x) < 20 && Math.abs(z - camera.position.z) < 20);

        mesh.position.set(x, 1.5, z);
        mesh.castShadow = true;
        scene.add(mesh);

        const hpDiv = document.createElement('div');
        hpDiv.className = 'enemy-hp';
        hpDiv.style.display = 'block';
        document.getElementById('enemy-huds').appendChild(hpDiv);

        enemies.push({
            mesh: mesh, hp: 100, maxHp: 100, hpUi: hpDiv,
            targetPos: getRandomWaypoint(mesh.position),
            speed: 5 + Math.random() * 3
        });
    }

    function getRandomWaypoint(currentPos) {
        let angle = Math.random() * Math.PI * 2;
        let dist = 10 + Math.random() * 10;
        return new THREE.Vector3(currentPos.x + Math.cos(angle) * dist, currentPos.y, currentPos.z + Math.sin(angle) * dist);
    }

    function damageEnemy(enemy, amount) {
        enemy.hp -= amount;
        
        if(!player.ultActive) {
            player.ultGauge = Math.min(100, player.ultGauge + amount * 0.5);
            updateUltUI();
        }

        enemy.mesh.material.color.setHex(0xffffff);
        setTimeout(() => { if(enemy.mesh) enemy.mesh.material.color.setHex(0xff3333); }, 100);

        if (enemy.hp <= 0) {
            score++;
            document.getElementById('score').innerText = score;
            createExplosion(enemy.mesh.position, 1.5, 0xff9900);
            
            scene.remove(enemy.mesh);
            enemy.hpUi.remove();
            enemies = enemies.filter(e => e !== enemy);
            setTimeout(spawnEnemy, 3000);
        }
    }

    function updateEnemies(dt) {
        enemies.forEach(enemy => {
            let dir = new THREE.Vector3().subVectors(enemy.targetPos, enemy.mesh.position);
            if (dir.length() < 1) {
                enemy.targetPos = getRandomWaypoint(enemy.mesh.position);
            } else {
                dir.normalize();
                enemy.mesh.position.add(dir.multiplyScalar(enemy.speed * dt));
            }

            let screenPos = enemy.mesh.position.clone();
            screenPos.y += 2;
            screenPos.project(camera);

            if (screenPos.z < 1) { 
                let x = (screenPos.x * .5 + .5) * window.innerWidth;
                let y = (screenPos.y * -.5 + .5) * window.innerHeight;
                enemy.hpUi.style.display = 'block';
                enemy.hpUi.style.left = `${x}px`;
                enemy.hpUi.style.top = `${y}px`;
                enemy.hpUi.style.width = `${40 * (enemy.hp / enemy.maxHp)}px`;
            } else {
                enemy.hpUi.style.display = 'none';
            }
        });
    }

    function updatePhysics(dt) {
        if(!isGameRunning) return;

        let currentSpeed = player.isSprinting ? player.speed * player.sprintMultiplier : player.speed;

        let moveVec = new THREE.Vector3();
        // 조이스틱 방향값 적용
        if (player.direction.z !== 0 || player.direction.x !== 0) {
            let angle = Math.atan2(player.direction.x, player.direction.z);
            let moveEuler = new THREE.Euler(0, camera.rotation.y + angle, 0, 'YXZ');
            moveVec.set(0, 0, -1).applyEuler(moveEuler).multiplyScalar(currentSpeed * dt);
        }

        let nextPos = camera.position.clone().add(moveVec);
        let playerBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(1, player.height, 1));
        
        let collision = false;
        for (let collider of colliders) {
            let colBox = new THREE.Box3().setFromObject(collider);
            if (playerBox.intersectsBox(colBox)) { collision = true; break; }
        }
        
        if (!collision) {
            camera.position.x = nextPos.x;
            camera.position.z = nextPos.z;
        }

        player.velocity.y += gravity * dt;
        camera.position.y += player.velocity.y * dt;

        if (camera.position.y < player.height) {
            player.velocity.y = 0;
            camera.position.y = player.height;
            player.canJump = true;
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        
        const dt = Math.min(clock.getDelta(), 0.1); 
        
        if(isGameRunning) {
            gameTime += dt;
            let min = Math.floor(gameTime / 60);
            let sec = Math.floor(gameTime % 60);
            document.getElementById('timer').innerText = `${min < 10 ? '0':''}${min}:${sec < 10 ? '0':''}${sec}`;
        }

        updatePhysics(dt);

        if (player.isShooting && gameTime > player.lastFireTime + player.fireRate) {
            fireRifle();
            player.lastFireTime = gameTime;
        }

        for (let key in cooldowns) {
            if (cooldowns[key].current > 0) {
                cooldowns[key].current -= dt;
                if (cooldowns[key].current < 0) cooldowns[key].current = 0;
            }
        }
        updateCooldownUI();

        if (player.ultActive) {
            player.ultTimer -= dt;
            if (player.ultTimer <= 0) {
                player.ultActive = false;
                document.getElementById('ult-overlay').style.display = 'none';
            }
        }

        bioticFields.forEach((field, index) => {
            field.timer -= dt;
            let dist = field.mesh.position.distanceTo(camera.position);
            if (dist < 4) {
                player.hp = Math.min(player.maxHp, player.hp + 20 * dt);
                updateHealthUI();
            }
            if (field.timer <= 0) { scene.remove(field.mesh); bioticFields.splice(index, 1); }
        });

        projectiles.forEach((proj, index) => {
            if (!proj.active) return;
            proj.mesh.position.add(proj.velocity.clone().multiplyScalar(dt));
            
            if (proj.mesh.position.y <= 0) {
                createExplosion(proj.mesh.position, 6, 0xffaa00, 60); 
                scene.remove(proj.mesh);
                proj.active = false;
                return;
            }

            let pBox = new THREE.Box3().setFromObject(proj.mesh);
            for (let collider of colliders) {
                let cBox = new THREE.Box3().setFromObject(collider);
                if (pBox.intersectsBox(cBox)) {
                    createExplosion(proj.mesh.position, 6, 0xffaa00, 60);
                    scene.remove(proj.mesh);
                    proj.active = false;
                    break;
                }
            }
        });
        projectiles = projectiles.filter(p => p.active);

        particles.forEach((p, index) => {
            p.life -= dt * 2; 
            p.mesh.scale.addScalar(p.scaleRate * dt);
            p.mesh.material.opacity = p.life / p.maxLife;
            if (p.life <= 0) {
                scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose();
                particles.splice(index, 1);
            }
        });

        if(isGameRunning) updateEnemies(dt);
        renderer.render(scene, camera);
    }

    function updateHealthUI() {
        let percent = (player.hp / player.maxHp) * 100;
        document.getElementById('health-bar').style.width = percent + '%';
        document.getElementById('health-bar').style.backgroundColor = percent < 30 ? '#ff3333' : '#ffffff';
        document.getElementById('health-text').innerText = `${Math.floor(player.hp)} / ${player.maxHp}`;
    }

    function updateUltUI() {
        let percent = Math.floor(player.ultGauge);
        document.getElementById('ult-text').innerText = percent + '%';
        document.getElementById('ult-fill').style.height = percent + '%';
        
        if (percent >= 100) {
            document.getElementById('ult-btn').style.borderColor = '#00aaff';
            document.getElementById('ult-btn').style.boxShadow = '0 0 15px #00aaff';
        } else {
            document.getElementById('ult-btn').style.borderColor = '#fff';
            document.getElementById('ult-btn').style.boxShadow = 'none';
        }
    }

    function updateCooldownUI() {
        let cdE = document.getElementById('cd-e');
        if (cooldowns.E.current > 0) { cdE.style.display = 'flex'; cdE.innerText = Math.ceil(cooldowns.E.current); } 
        else cdE.style.display = 'none';

        let cdR = document.getElementById('cd-r');
        if (cooldowns.R.current > 0) { cdR.style.display = 'flex'; cdR.innerText = Math.ceil(cooldowns.R.current); } 
        else cdR.style.display = 'none';
    }
</script>
</body>
